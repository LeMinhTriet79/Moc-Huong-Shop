apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aromatics-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/LeMinhTriet79/Moc-Huong-Shop.git'
    targetRevision: main
    path: aromatics-platform/k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: aromatics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
